[Network]
port = 5000
caps = application/x-rtp, media=video, clock-rate=90000, encoding-name=H264

[Pipeline]
elements = udpsrc;capsfilter;rtph264depay;h264parse;avdec_h264;videoconvert;autovideosink

[Names]
udpsrc = udp_src
capsfilter = caps_filter
rtph264depay = rtp_depay
h264parse = h264_parser
avdec_h264 = h264_decoder
videoconvert = video_conv
autovideosink = video_sink
